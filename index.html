<!DOCTYPE html>
<html>
<head>
  <title>AI Finger & Eye FINAL FIX</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      margin:0;
      text-align:center;
    }

    canvas {
      width:90%;
      border-radius:15px;
      margin-top:10px;
    }

    .overlay {
      position:absolute;
      top:10px;
      left:10px;
      background:rgba(0,0,0,0.6);
      padding:8px;
      border-radius:10px;
      color:#22c55e;
    }

    .box {
      position:relative;
      display:inline-block;
    }

    button {
      position:fixed;
      top:10px;
      right:10px;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
    }
  </style>
</head>

<body>

<button onclick="enableSound()">🔊 Aktifkan Suara</button>

<h2>📷 Kamera AI</h2>

<div class="box">
  <video id="video" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas"></canvas>

  <div id="fingerCount" class="overlay">Jumlah jari: 0</div>
</div>

<h3 id="status">Menunggu deteksi...</h3>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");
const fingerText = document.getElementById("fingerCount");

// SOUND
let soundEnabled = false;
let lastSpeak = 0;

function enableSound(){
  soundEnabled = true;
  speechSynthesis.speak(new SpeechSynthesisUtterance("Suara aktif"));
}

function speak(text){
  if(!soundEnabled) return;
  let now = Date.now();
  if(now - lastSpeak < 2000) return;
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
  lastSpeak = now;
}

// MEDIAPIPE
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

const faceMesh = new FaceMesh({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});

hands.setOptions({maxNumHands:1});
faceMesh.setOptions({maxNumFaces:1});

let toggle = true;
let lastFinger = 0;
let eyeClosedFrames = 0;

// HAND
hands.onResults(res=>{
  if(res.multiHandLandmarks){
    const lm = res.multiHandLandmarks[0];

    drawConnectors(ctx, lm, HAND_CONNECTIONS);
    drawLandmarks(ctx, lm);

    let count = 0;
    [4,8,12,16,20].forEach(t=>{
      if(lm[t].y < lm[t-2].y) count++;
    });

    fingerText.innerText = "Jumlah jari: " + count;

    if(count !== lastFinger && count > 0){
      speak("Jari " + count);
      statusText.innerText = "✋ " + count + " jari";
      lastFinger = count;
    }
  }
});

// FACE
faceMesh.onResults(res=>{
  if(res.multiFaceLandmarks){
    const lm = res.multiFaceLandmarks[0];

    let ear = Math.abs(lm[159].y - lm[145].y);

    if(ear < 0.01){
      eyeClosedFrames++;
    } else {
      eyeClosedFrames = 0;
    }

    if(eyeClosedFrames > 4){
      speak("anda merem");
      statusText.innerText = "😴 Mata tertutup";
      eyeClosedFrames = 0;
    }
  }
});

// CAMERA
async function start(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

async function loop(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  function draw(){
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    if(toggle){
      hands.send({image:video});
    } else {
      faceMesh.send({image:video});
    }

    toggle = !toggle;

    requestAnimationFrame(draw);
  }

  draw();
}

start();
</script>

</body>
</html>
