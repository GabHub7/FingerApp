<!DOCTYPE html>
<html>
<head>
  <title>TEST MEDIAPIPE</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>

<body style="background:black;color:white;text-align:center">

<h2>TEST MEDIAPIPE</h2>

<video id="video" autoplay playsinline width="300"
style="transform: scaleX(-1);"></video>

<h3 id="log">Loading...</h3>

<script>
const video = document.getElementById("video");
const log = document.getElementById("log");

// CAMERA DEPAN
async function start(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user" }
    });

    video.srcObject = stream;
    log.innerText = "Kamera OK";

  }catch(e){
    log.innerText = "Kamera ERROR";
    console.log(e);
  }
}

// MEDIAPIPE
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:1
});

// DETEKSI RESULT
hands.onResults(res=>{
  log.innerText = "DETECT JALAN";

  if(res.multiHandLandmarks){
    log.innerText = "TANGAN TERDETEKSI ✅";
  }
});

// LOOP
async function detectLoop(){
  await hands.send({image: video});
  requestAnimationFrame(detectLoop);
}

// START
start();

setTimeout(()=>{
  detectLoop();
},2000);

</script>

</body>
</html>
