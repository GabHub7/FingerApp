<!DOCTYPE html>
<html>
<head>
  <title>Kamera Fix 100%</title>
</head>

<body style="background:black; color:white; text-align:center;">

<h2>KAMERA TEST</h2>

<video id="video" autoplay playsinline width="300" style="border:2px solid white;"></video>

<script>
const video = document.getElementById("video");

async function start(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;
    video.play();
  }catch(e){
    alert("kamera gagal");
    console.log(e);
  }
}

start();
</script>

</body>
</html>
